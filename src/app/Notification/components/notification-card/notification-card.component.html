<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ notification.title }}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    {{ notification.body }}
  </mat-card-content>
  <mat-card-actions class="card-actions">
    <button mat-button (click)="removeNotification(notification.id)">
      Close
    </button>
  </mat-card-actions>
</mat-card>
