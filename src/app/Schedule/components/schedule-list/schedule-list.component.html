<h2>Schedule List</h2>
<div class="schedule-line">
  <button mat-flat-button color="primary" (click)="createSchedule()" class="add-button">
    ADD
  </button>
</div>

<div *ngIf="schedules.length === 0">No Schedules</div>

<table mat-table [dataSource]="schedules" class="mat-elevation-z8" *ngIf="schedules.length > 0">
  <!-- Name Column -->
  <ng-container matColumnDef="schedule-start_date">
    <th mat-header-cell *matHeaderCellDef>Time</th>
    <td mat-cell *matCellDef="let schedule">{{ schedule.start_date | date:'shortTime'}}</td>
  </ng-container>

  <!-- Actions Column -->
  <ng-container matColumnDef="schedule-actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let schedule">
      <button mat-icon-button (click)="updateSchedule(schedule.id)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button (click)="deleteSchedule(schedule.id)">
        <mat-icon color="warn">delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
