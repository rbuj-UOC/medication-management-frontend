<div style="margin-left: auto; margin-right: auto">
  <p id="contactListFeedback"></p>
</div>
<app-contact-table [contacts]="contacts" (removeUserContactRequest)="removeUserContact($event)"

  *ngIf="isMobile===true"></app-contact-grid>
