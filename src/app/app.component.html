<app-spinner *ngIf="showLoadingAuth$ | async"></app-spinner>
<app-spinner *ngIf="showLoadingUser$ | async"></app-spinner>

<!-- NO AUTH REQUIRED -->
<mat-toolbar *ngIf="showNoAuthSection" color="primary">
  <button mat-icon-button aria-label="Menu icon" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="toolbar-spacer"></span>
  <button mat-flat-button color="primary" (click)="login()">Login</button>
  <button mat-flat-button color="primary" (click)="register()">Register</button>
</mat-toolbar>
<!-- AUTH REQUIRED -->
<mat-toolbar *ngIf="showAuthSection" color="primary">
  <button mat-icon-button aria-label="Menu icon" (click)="toggleMenu()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="toolbar-spacer"></span>
  <button mat-flat-button color="primary" (click)="profile()">Profile</button>
  <button mat-flat-button color="primary" (click)="logout()">Logout</button>
</mat-toolbar>

<mat-sidenav-container autosize="true">
  <mat-sidenav [ngClass]="!isCollapsed ? 'expanded' : 'collapsed'" [mode]="isMobile ? 'over' : 'side'"
    [opened]="isMobile ? 'false' : 'true'">
    <mat-nav-list>
      <a mat-list-item routerLinkActive (click)="landing()" *ngIf="showNoAuthSection">
        <span class="entry">
          <mat-icon>home</mat-icon>
          <span *ngIf="!isCollapsed">Home</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="userToday()" *ngIf="showUserSection">
        <span class="entry">
          <mat-icon>home</mat-icon>
          <span *ngIf="!isCollapsed">Today</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="adminDashboard()" *ngIf="showAdminSection">
        <span class="entry">
          <mat-icon>home</mat-icon>
          <span *ngIf="!isCollapsed">Dashboard</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="userMedications()" *ngIf="showUserSection">
        <span class="entry">
          <mat-icon>medication</mat-icon>
          <span *ngIf="!isCollapsed">Medications</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="userHistory()" *ngIf="showUserSection">
        <span class="entry">
          <mat-icon>history</mat-icon>
          <span *ngIf="!isCollapsed">History</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="userContacts()" *ngIf="showUserSection">
        <span class="entry">
          <mat-icon>perm_contact_cal</mat-icon>
          <span *ngIf="!isCollapsed">Contacts</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="adminUsers()" *ngIf="showAdminSection">
        <span class="entry">
          <mat-icon>supervised_user_circle</mat-icon>
          <span *ngIf="!isCollapsed">Users</span>
        </span>
      </a>
      <a mat-list-item routerLinkActive (click)="adminTasks()" *ngIf="showAdminSection">
        <span class="entry">
          <mat-icon>task_alt</mat-icon>
          <span *ngIf="!isCollapsed">Tasks</span>
        </span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="router-content">
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
    <div class="footer-content">
      <ul class="footer-menu">
        <li>© 2025 Robert Buj</li>
        <li><a routerLink="/privacy">Privacy Policy</a></li>
        <li><a routerLink="/terms">Terms of Service</a></li>
        <li><a routerLink="/help">Help</a></li>
      </ul>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
